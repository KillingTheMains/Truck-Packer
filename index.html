<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truck Packer — SAP Sapphire 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Truck Packer">
<meta name="theme-color" content="#e91e8c">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Bebas+Neue&family=Oswald:wght@700&family=Anton&family=Barlow+Condensed:wght@900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;margin:0;padding:0;overflow:hidden;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;}
#root{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── Loading / Save ── */
@keyframes spin{to{transform:rotate(360deg);}}
.app-loader{position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;}
.app-loader-ring{width:44px;height:44px;border:4px solid #2a3a5a;border-top-color:#90A4AE;border-radius:50%;animation:spin 1s linear infinite;}
.save-pill{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid;white-space:nowrap;}
.save-pill.saved{color:#43A047;border-color:rgba(67,160,71,.4);background:rgba(67,160,71,.08);}
.save-pill.saving{color:#FFA726;border-color:rgba(255,167,38,.4);background:rgba(255,167,38,.08);}
.save-pill.unsaved{color:#90A4AE;border-color:rgba(144,164,174,.3);background:transparent;}
.save-pill.error{color:#E53935;border-color:rgba(229,57,53,.4);background:rgba(229,57,53,.08);}

/* ── TOP BAR ── */
.topbar{background:#1F3864;padding:0 12px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #90A4AE;height:44px;flex-shrink:0;}
.topbar h1{font-size:17px;font-weight:bold;color:#fff;white-space:nowrap;letter-spacing:.04em;}
.topbar-logo{height:32px;object-fit:contain;flex-shrink:0;}
.tb-sep{width:1px;height:22px;background:#2a4a7a;margin:0 2px;}
.truck-nav{display:flex;align-items:center;gap:4px;}
.truck-nav select{background:#0f2044;color:#fff;border:1px solid #90A4AE;border-radius:4px;padding:4px 8px;font-size:12px;min-width:90px;}
.nav-btn{background:#0f2044;color:#aaa;border:1px solid #334;border-radius:3px;padding:3px 7px;cursor:pointer;font-size:12px;}
.nav-btn:hover{background:#1a3060;color:#fff;}
.pill{background:#0f2044;border:1px solid #2a5a8a;border-radius:10px;padding:2px 9px;font-size:10px;color:#90A4AE;white-space:nowrap;}
.spacer{flex:1;}
.btn{padding:5px 11px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold;white-space:nowrap;}
.btn:hover{opacity:.85;} .btn:disabled{opacity:.35;cursor:default;}
.btn-undo{background:#546E7A;color:#fff;}
.btn-clear{background:#7b1f1f;color:#fff;}
.btn-pdf{background:#4a148c;color:#fff;}
.btn-save{background:#1b5e20;color:#fff;}
.btn-load{background:#0d47a1;color:#fff;}
.btn-gs{background:#1a5276;color:#fff;}
.btn-dispatch-hdr{background:#1a2a4a;color:#7dcfff;border:1px solid #2a5a8a;font-weight:bold;}
.btn-gs.connected{background:#1a5e1a;color:#aaffaa;}
.btn-rot{background:#374a2a;color:#cce;border:1px solid #5a7a40;}
.btn-rot.active{background:#4a6e2a;color:#aeff80;border-color:#7ab840;}
.mode-pill{padding:4px 12px;border-radius:10px;font-size:11px;font-weight:bold;cursor:pointer;border:none;white-space:nowrap;transition:background .15s;}
.mode-pill.place{background:#0d3060;color:#90cfff;outline:2px solid #2a6aaa;}
.mode-pill.move{background:#1a3a1a;color:#80dd80;outline:2px solid #2a6a2a;}
.mode-pill:hover{opacity:.85;}
.show-name-input{background:transparent;border:none;border-bottom:1px solid #4a6a9a;color:#fff;font-size:15px;font-weight:bold;text-align:center;padding:2px 8px;min-width:160px;max-width:300px;letter-spacing:.04em;outline:none;}
.show-name-input::placeholder{color:#4a6a8a;font-weight:normal;font-style:italic;}
.show-name-input:focus{border-bottom-color:#90A4AE;}

/* ── INFO BAR ── */
.infobar{background:#101c38;border-bottom:1px solid #2a3a5a;padding:5px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;overflow-x:auto;overflow-y:hidden;height:46px;}
.info-field{display:flex;align-items:center;gap:5px;font-size:13px;}
.info-lbl{color:#778;text-transform:uppercase;font-size:11px;font-weight:bold;white-space:nowrap;}
.info-inp{background:transparent;border:none;border-bottom:1px solid #334;color:#ccc;font-size:13px;padding:1px 4px;outline:none;box-sizing:content-box;field-sizing:content;}
.info-inp:focus{border-bottom-color:#90A4AE;color:#fff;}
.gs-dot{width:7px;height:7px;border-radius:50%;background:#556;display:inline-block;margin-right:4px;}
.gs-dot.ok{background:#43A047;} .gs-dot.err{background:#E53935;} .gs-dot.loading{background:#FFA726;}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── LEFT SIDEBAR ── */
.sidebar{width:195px;flex-shrink:0;background:#16213e;border-right:1px solid #2a3a5a;display:flex;flex-direction:column;overflow:hidden;}
.sidebar-hdr{padding:6px 10px;font-size:10px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.07em;background:#0f1b33;border-bottom:1px solid #2a3a5a;flex-shrink:0;}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;}
.sidebar-scroll,.placed-list,.qty-body,.manifest-list{scrollbar-width:none;-ms-overflow-style:none;}
.sidebar-scroll::-webkit-scrollbar,.placed-list::-webkit-scrollbar,.qty-body::-webkit-scrollbar,.manifest-list::-webkit-scrollbar{display:none;}
.cat-hdr{padding:5px 10px;font-size:10px;font-weight:bold;text-transform:uppercase;color:#aaa;background:#111d33;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid #1e2a44;}
.cat-hdr:hover{background:#182540;}
.pal-item{display:flex;align-items:center;gap:7px;padding:5px 10px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid #1a2540;}
.pal-item:hover{background:#1e2d4a;}
.pal-item.sel{background:#1e3558;border-left-color:#90A4AE;}
.sw{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:bold;flex-shrink:0;border:1px solid rgba(255,255,255,.15);}
.iname{font-size:11px;font-weight:bold;line-height:1.2;}
.idim{font-size:9px;color:#778;}
.sb-footer{padding:9px;font-size:10px;color:#445;line-height:1.7;border-top:1px solid #2a3a5a;flex-shrink:0;}
.rot-bar{padding:6px 10px;border-top:1px solid #2a3a5a;display:flex;align-items:center;gap:6px;flex-shrink:0;background:#0f1b33;}

/* ── CANVAS ── */
.canvas-wrap{flex-shrink:0;padding:8px 12px 6px;background:#12182b;display:flex;flex-direction:column;gap:6px;}
.canvas-label{font-size:11px;color:#90A4AE;font-weight:bold;letter-spacing:.04em;}
.ruler-row{position:relative;height:26px;flex-shrink:0;}
.ruler-tick{position:absolute;font-size:21px;color:#778;text-align:center;transform:translateX(-50%);line-height:1;}
.trailer-border{border:4px solid #555;background:#0d0d0d;position:relative;user-select:none;overflow:visible;flex-shrink:0;}
.trailer-place{cursor:default;}
.trailer-move{cursor:default;}
.ghost-box{position:absolute;border-radius:2px;border:2px dashed rgba(255,255,255,.6);pointer-events:none;z-index:3;display:flex;align-items:center;justify-content:center;}
.ghost-ok  {background:rgba(67,160,71,.35);}
.ghost-warn{background:rgba(255,160,0,.3);border-color:rgba(255,180,0,.8)!important;}
.ghost-bad {background:rgba(229,57,53,.35);}
.placed{position:absolute;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.25);z-index:2;transition:filter .1s;}
.placed:hover{filter:brightness(1.3);}
.placed.selected-item{outline:2px solid #fff;filter:brightness(1.2);}
.placed.overlapping{box-shadow:0 0 0 2px #ff3333,0 0 10px rgba(255,50,50,.6)!important;z-index:4;}
.placed.dragging{opacity:.8;z-index:10!important;cursor:grabbing!important;transition:none;}
.placed-grab{cursor:grab;}
.plbl{font-weight:bold;text-align:center;line-height:1.2;padding:1px 2px;pointer-events:none;overflow:hidden;}
.plbl-note{opacity:.85;text-align:center;pointer-events:none;overflow:hidden;max-height:20px;}
.stats{font-size:15px;color:#778;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.stats span{color:#90cfff;font-weight:bold;}

/* ── CONTENT AREA (canvas + bottom panel) ── */
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── BOTTOM PANEL ── */
.bottom-panel{flex:1;min-height:0;background:#16213e;border-top:2px solid #2a3a5a;display:flex;overflow:hidden;}
.placed-section{flex:0 0 25%;min-width:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #2a3a5a;}
.qty-section{flex:2;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#0f1b33;border-right:1px solid #2a3a5a;}
.panel-hdr{padding:5px 10px;font-size:20px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.07em;background:#0f1b33;border-bottom:1px solid #2a3a5a;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.placed-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0;min-height:0;}
.placed-row{padding:0;border-bottom:1px solid #1a2540;cursor:pointer;display:flex;align-items:stretch;}
.placed-row:hover{background:#1e2d4a;}
.placed-row.active{background:#1e3558;outline:2px solid rgba(255,255,255,.65);outline-offset:-2px;}
.placed-row.conflict{border-left:3px solid #ff3333;}
.pr-content{flex:1;min-width:0;padding:5px 8px;}
.pr-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.pr-dot{border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.2);}
.pr-name{font-size:22px;font-weight:bold;flex:1;line-height:1.2;}
.pr-pos{font-size:14px;color:#556;}
.pr-remove{background:none;border:none;color:#555;cursor:pointer;font-size:20px;padding:0 2px;line-height:1;}
.pr-remove:hover{color:#E53935;}
.pr-rot{background:none;border:none;color:#6a9;cursor:pointer;font-size:20px;padding:0 2px;line-height:1;font-weight:bold;}
.pr-rot:hover{color:#affe80;}
.pr-input{width:100%;background:#0d1526;border:1px solid #2a3a5a;border-radius:3px;color:#ccc;font-size:12px;padding:3px 6px;outline:none;}
.pr-input:focus{border-color:#90A4AE;color:#fff;}
.pr-colors{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:nowrap;justify-content:flex-end;}
.pr-clbl{font-size:14px;color:#445;margin-right:auto;white-space:nowrap;}
.pr-swatch{width:16px;height:16px;border-radius:3px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color .1s;}
.pr-swatch:hover{border-color:#90A4AE;}
.pr-swatch.active{border-color:#fff;}
.pr-swatch.glass-swatch{background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,rgba(255,255,255,.05) 100%);border-color:#446!important;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);}
.pr-swatch.glass-swatch.active{border-color:#90A4AE!important;}
.placed-glass{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:rgba(255,255,255,.08)!important;border:1px solid rgba(255,255,255,.2)!important;}
.empty-msg{padding:20px 12px;text-align:center;font-size:11px;color:#334;}

/* ── QTY / QUICK SEND split ── */
.qty-live-wrap{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;border-bottom:2px solid #2a3a5a;}
.qs-section{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:#0a1220;}
.qs-body{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px;min-height:0;}
.qs-msg-btn{width:100%;padding:6px 10px;border-radius:5px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid;text-align:left;transition:filter .15s;display:flex;align-items:center;gap:6px;}
.qs-msg-btn:hover{filter:brightness(1.2);}
.qs-msg-btn:disabled{opacity:.4;cursor:default;filter:none;}
.qs-custom{width:100%;background:#0d1526;border:1px solid #2a3a5a;border-radius:4px;color:#ccc;font-size:11px;padding:5px 8px;outline:none;resize:none;font-family:inherit;}
.qs-custom:focus{border-color:#90A4AE;color:#fff;}
.qs-send-row{display:flex;gap:6px;align-items:center;}
.qs-wh-select{flex:1;background:#0d1526;border:1px solid #2a3a5a;border-radius:4px;color:#ccc;font-size:11px;padding:4px 6px;outline:none;}
.qs-wh-select:focus{border-color:#90A4AE;}
.qs-log{border-top:1px solid #1a2a44;padding:4px 10px;flex-shrink:0;max-height:72px;overflow-y:auto;}
.qs-log-row{font-size:9px;color:#445;padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qs-log-row.ok{color:#2a6a3a;} .qs-log-row.err{color:#7a2a2a;}
/* ── Dispatch Modal ── */
.dispatch-cols{display:flex;gap:12px;margin:10px 0;min-height:0;flex:1;}
.dispatch-col{flex:1;display:flex;flex-direction:column;min-height:0;border:1px solid #2a3a5a;border-radius:6px;overflow:hidden;background:#080f1e;}
.dispatch-col-hdr{padding:7px 10px;font-size:11px;font-weight:bold;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;gap:6px;}
.dispatch-truck-list{flex:1;overflow-y:auto;min-height:0;}
.dispatch-truck-row{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;border-bottom:1px solid #0d1526;font-size:11px;transition:background .1s;}
.dispatch-truck-row:hover{background:#111d33;}
.dispatch-truck-row.selected{background:#0d2040;}
.dispatch-check{width:14px;height:14px;border-radius:3px;border:1px solid #2a4a6a;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.dispatch-preview{background:#050c18;border:1px solid #1a2a44;border-radius:5px;padding:10px 12px;font-size:11px;color:#8ab;font-family:monospace;white-space:pre-wrap;word-break:break-word;min-height:48px;margin:8px 0;line-height:1.6;}
/* ── History Terminal ── */
.history-wrap{flex:1;display:flex;flex-direction:column;background:#020810;overflow:hidden;min-height:0;}
.history-toolbar{padding:7px 14px;background:#040c1a;border-bottom:1px solid #0a1828;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.history-filter-btn{padding:3px 9px;border-radius:3px;font-size:10px;font-weight:bold;cursor:pointer;border:1px solid #0d1e30;background:transparent;color:#2a4a5a;letter-spacing:.05em;font-family:monospace;}
.history-filter-btn.hf-active{background:#0a1e32;color:#90A4AE;border-color:#1e3a52;}
.history-filter-btn:hover{color:#90A4AE;}
.history-log{flex:1;overflow-y:auto;padding:10px 16px 16px;font-family:'Courier New',Courier,monospace;font-size:11px;line-height:1.65;display:flex;flex-direction:column-reverse;}
.h-line{display:flex;gap:0;padding:1px 0;align-items:baseline;border-bottom:1px solid rgba(255,255,255,.018);}
.h-sub{padding:1px 0 1px 130px;color:#1e3a4a;font-family:'Courier New',Courier,monospace;font-size:10.5px;white-space:pre-wrap;}
.h-ts{color:#162a38;flex-shrink:0;width:92px;font-size:10px;padding-top:1px;}
.h-badge{flex-shrink:0;font-weight:bold;width:90px;font-size:10px;letter-spacing:.06em;}
.h-detail{color:#3a6070;flex:1;font-size:11px;}
.h-truck{color:#7ab4cc;font-weight:bold;}
.h-cursor{display:inline-block;width:7px;height:12px;background:#43A047;animation:hcur 1.1s step-end infinite;margin-left:3px;vertical-align:middle;}
@keyframes hcur{50%{opacity:0;}}
.h-empty{color:#0e2030;font-family:'Courier New',monospace;font-size:12px;padding:20px 0;}
/* ── Auto Pack Beta ─────────────────────────────────────────────────────── */
.ap-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#1a1a2e;min-height:0;}
.ap-topbar{display:flex;align-items:center;gap:8px;padding:0 12px;background:#1F3864;border-bottom:2px solid #90A4AE;flex-shrink:0;height:44px;overflow-x:auto;}
.ap-badge{font-size:9px;font-weight:bold;padding:1px 5px;border-radius:3px;background:#FF6D00;color:#fff;letter-spacing:.06em;flex-shrink:0;}
.ap-btn{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid #2a4a7a;background:#0f2044;color:#90A4AE;letter-spacing:.03em;transition:background .12s,color .12s,border-color .12s;white-space:nowrap;flex-shrink:0;}
.ap-btn:hover{background:#1a3060;color:#fff;}
.ap-btn.ap-active{background:#1a3060;color:#90cfff;border-color:#90A4AE;box-shadow:0 0 5px rgba(144,164,174,.25);}
.ap-btn.ap-danger{background:#1a0d0d;color:#cc6666;border-color:#5a2020;}
.ap-btn.ap-danger:hover{background:#2a0f0f;color:#ff8888;border-color:#8a3030;}
.ap-btn.ap-disabled{opacity:.3;cursor:default;pointer-events:none;}
.ap-sep{width:1px;height:22px;background:#2a4a7a;margin:0 2px;flex-shrink:0;}
.ap-lbl{font-size:10px;color:#90A4AE;white-space:nowrap;flex-shrink:0;}
.ap-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ap-canvas-area{flex:1;overflow:auto;padding:10px 12px 0;background:#1a1a2e;display:flex;flex-direction:column;min-height:0;}
.ap-bottom-row{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;border-top:2px solid #2a3a5a;}
.ap-purgatory{flex:2;background:#0f1b33;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #2a3a5a;}
.ap-purg-hdr{padding:6px 12px 4px;font-size:11px;font-weight:bold;color:#FF6D00;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1a2a44;}
.ap-purg-grid{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;}
.ap-purg-card{background:#0d1526;border:1px solid #FF6D00;border-radius:5px;padding:5px 8px;min-width:110px;max-width:200px;cursor:pointer;transition:all .1s;position:relative;}
.ap-purg-card:hover{background:#1a0800;border-color:#ff8844;}
.ap-purg-card.ap-purg-sel{background:#0d1a2e;border-color:#4a8eff;box-shadow:0 0 5px rgba(74,142,255,.3);}
.ap-purg-card-name{font-size:10px;font-weight:bold;color:#FF6D00;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-purg-card.ap-purg-sel .ap-purg-card-name{color:#4a8eff;}
.ap-purg-card-lbl{font-size:9px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ap-purg-card-btns{display:flex;gap:3px;margin-top:4px;}
.ap-purg-check{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:2px;border:1px solid #2a4a6a;background:#060d18;display:flex;align-items:center;justify-content:center;font-size:8px;color:#2a4a6a;flex-shrink:0;}
.ap-purg-sel .ap-purg-check{background:#1a3060;border-color:#4a8eff;color:#90cfff;}
.ap-stack-bar{padding:6px 10px;background:#0a1020;border-top:1px solid #2a3a5a;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ap-live-count{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0f1b33;border-right:1px solid #2a3a5a;}
.ap-sidebar{width:210px;flex-shrink:0;background:#16213e;border-left:2px solid #2a3a5a;display:flex;flex-direction:column;overflow:hidden;}
.ap-sb-hdr{padding:7px 10px 3px;font-size:11px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.07em;flex-shrink:0;}
.ap-sb-sec{border-bottom:1px solid #1e2d44;padding:6px 10px;flex-shrink:0;}
.ap-input{width:100%;background:#0d1526;border:1px solid #2a3a5a;border-radius:4px;color:#7cf;font-size:12px;padding:5px 8px;outline:none;font-family:monospace;box-sizing:border-box;}
.ap-input:focus{border-color:#43A047;color:#afd;box-shadow:0 0 4px rgba(67,160,71,.3);}
.ap-scan-log{flex:1;overflow-y:auto;padding:4px 6px;min-height:0;}
.ap-scan-row{font-size:20px;padding:2px 0;color:#3a6070;font-family:monospace;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-scan-row.ap-unk{color:#FF6D00;}
.ap-scan-row.ap-dup{color:#E53935;}
.ap-scan-group{margin-bottom:3px;}
.ap-scan-group.stacked{border-left:2px solid #2a4a6a;padding-left:5px;margin-bottom:5px;}
.ap-scan-panel{flex:3;background:#16213e;display:flex;flex-direction:column;overflow:hidden;}
.ap-scan-left{flex-shrink:0;border-bottom:1px solid #2a3a5a;padding:8px 10px;display:flex;flex-direction:column;gap:5px;}
.ap-scan-right{flex:1;overflow-y:auto;padding:6px 10px;min-width:0;}
.ap-scan-hdr{font-size:20px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
.ap-flag-row{display:flex;align-items:center;gap:5px;padding:3px 4px;cursor:pointer;border-radius:3px;font-size:10px;color:#FF6D00;font-family:monospace;}
.ap-flag-row:hover{background:#1a0800;}
.ap-status{padding:4px 10px;background:#101c38;border-top:1px solid #1e2d44;font-size:18px;color:#2a4a5a;font-family:monospace;flex-shrink:0;}
.ap-pending-item{animation:apBlink 1.1s ease-in-out infinite;}
@keyframes apBlink{0%,100%{box-shadow:0 0 0 2px #FDD835,0 0 8px rgba(253,216,53,.35)!important;}50%{box-shadow:0 0 0 2px #FDD835,0 0 16px rgba(253,216,53,.6)!important;}}
.ap-flagged-item{box-shadow:0 0 0 2px #FF6D00!important;}
.ap-item-tag{position:absolute;top:1px;right:2px;font-size:6px;font-weight:bold;color:rgba(255,255,255,.4);pointer-events:none;z-index:6;}
.ap-sel-bar{position:absolute;top:0;left:0;display:flex;gap:2px;padding:1px;z-index:10;background:rgba(0,0,0,.6);border-radius:0 0 3px 0;}
.ap-sel-btn{background:#0f2044;border:1px solid #2a4a7a;border-radius:2px;color:#90A4AE;font-size:8px;padding:1px 5px;cursor:pointer;line-height:1.3;font-weight:bold;}
.ap-sel-btn:hover{background:#1a3060;color:#fff;}
.ap-sel-btn.del{border-color:#5a2020;color:#cc6666;}
.ap-sel-btn.del:hover{background:#2a0f0f;color:#ff8888;}
.ap-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-height:340px;overflow-y:auto;padding:2px 0;}
.ap-picker-item{padding:7px 8px;border:1px solid #1e2d44;border-left-width:3px;border-radius:4px;cursor:pointer;font-size:10px;background:#0d1526;color:#90A4AE;text-align:left;transition:background .1s;}
.ap-picker-item:hover{background:#16213e;color:#fff;}
/* ── QTY PANEL ── */
.qty-panel{flex-shrink:0;border-top:2px solid #2a3a5a;background:#0f1b33;max-height:180px;display:flex;flex-direction:column;min-height:0;}
.qty-hdr{padding:5px 10px;font-size:20px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center;cursor:pointer;flex-shrink:0;border-bottom:1px solid #1a2a44;}
.qty-hdr:hover{background:#182540;}
.qty-body{overflow-y:auto;min-height:0;flex:1;}
.qty-row{display:flex;align-items:center;gap:7px;padding:6px 10px;font-size:20px;border-bottom:1px solid #111d33;}
.qty-dots{flex:1;border-bottom:2px dotted #2a3a5a;margin:0 8px 4px;flex-shrink:1;min-width:12px;}
.qty-total{display:flex;align-items:center;padding:8px 10px;font-size:20px;border-top:2px solid #2a3a5a;flex-shrink:0;}
.qty-total-lbl{color:#90A4AE;font-weight:bold;white-space:nowrap;margin-right:auto;}
.qty-total-num{font-weight:bold;color:#90cfff;font-size:22px;white-space:nowrap;}
.qty-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,.15);}
.qty-name{color:#aaa;white-space:nowrap;flex-shrink:0;}
.qty-count{font-weight:bold;color:#90cfff;font-size:22px;white-space:nowrap;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#16213e;border:1px solid #2a3a5a;border-radius:8px;padding:20px;width:460px;max-width:95vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:14px;color:#90A4AE;margin-bottom:14px;font-weight:bold;}
.modal-row{margin-bottom:12px;}
.modal-row label{display:block;font-size:10px;color:#778;text-transform:uppercase;margin-bottom:4px;}
.modal-row input,.modal-row textarea{width:100%;background:#0d1526;border:1px solid #2a3a5a;border-radius:4px;color:#ccc;font-size:11px;padding:6px 8px;outline:none;}
.modal-row input:focus,.modal-row textarea:focus{border-color:#90A4AE;}
.modal-row textarea{height:70px;resize:vertical;font-family:monospace;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.modal-note{font-size:10px;color:#556;line-height:1.6;margin-top:8px;}
.status-ok{color:#43A047;font-size:11px;margin-top:6px;}
.status-err{color:#E53935;font-size:11px;margin-top:6px;}

/* ── FILL PROGRESS BAR ── */
.fill-bar-wrap{display:flex;align-items:center;gap:7px;}
.fill-bar-bg{height:14px;width:120px;background:#1a2a44;border-radius:6px;overflow:hidden;border:1px solid #2a3a5a;flex-shrink:0;}
.fill-bar-fg{height:100%;border-radius:6px;transition:width .4s,background .4s;}

/* ── PLACEHOLDER PANELS ── */
.placeholder-section{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#12182b;}
.placeholder-section:not(:last-child){border-right:1px solid #2a3a5a;}
.placeholder-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#2a3a5a;padding:16px;}
.placeholder-icon{font-size:28px;opacity:.4;}
.placeholder-lbl{font-size:11px;color:#334;text-align:center;line-height:1.5;}
.manifest-section{flex:4;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#12182b;border-right:1px solid #2a3a5a;}
.manifest-list{flex:1;overflow-y:auto;overflow-x:hidden;}
.manifest-row{display:flex;align-items:center;gap:8px;padding:3px 10px;border-bottom:1px solid rgba(0,0,0,.28);min-height:28px;box-sizing:border-box;}
.manifest-mnum{font-size:13px;font-weight:bold;flex-shrink:0;min-width:24px;text-align:right;line-height:1;}
.manifest-name{font-size:11px;font-weight:bold;flex:1;line-height:1.3;word-break:break-word;}
.manifest-note{font-size:10px;opacity:.85;flex-shrink:0;max-width:38%;text-align:right;line-height:1.3;font-style:italic;}
.manifest-empty{padding:24px 16px;color:#334;font-size:12px;text-align:center;}

/* ── DOUBLE / TRIPLE STACK ── */
.ds-badge{font-size:7px;font-weight:bold;letter-spacing:.05em;text-align:center;pointer-events:none;line-height:1;margin-top:1px;overflow:hidden;}
.placed-row.double-stacked{box-shadow:inset 0 0 0 2px #ff9800;}
.placed-row.triple-stacked{box-shadow:inset 0 0 0 2px #22c55e;}
.stack-checks{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
.ds-check-wrap{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;padding:2px 5px;border-radius:3px;border:1px solid transparent;}
.ds-check-wrap:hover{background:rgba(255,255,255,.05);}
.ds-check-lbl{font-size:14px;font-weight:bold;}
/* ── PLACED ITEMS CATEGORY HEADERS ── */
.placed-cat-hdr{padding:4px 8px;font-size:18px;font-weight:bold;text-transform:uppercase;color:#90A4AE;background:#0f1b33;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e2a44;letter-spacing:.06em;user-select:none;flex-shrink:0;}
.placed-cat-hdr:hover{background:#162030;}
/* ── SCAN LIST ── */
.scan-section{flex:3;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:#0d1220;border-left:1px solid #2a3a5a;}
.scan-input-wrap{padding:8px 10px;border-bottom:1px solid #2a3a5a;flex-shrink:0;background:#0a1020;}
.scan-input{width:100%;background:#111d33;border:2px solid #2a4a6a;border-radius:6px;color:#fff;font-size:14px;padding:7px 10px;outline:none;letter-spacing:.04em;}
.scan-input:focus{border-color:#90cfff;background:#0f1f3a;}
.scan-input::placeholder{color:#334;font-size:12px;}
.scan-summary{padding:5px 10px;font-size:11px;color:#445;flex-shrink:0;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid #1a2540;}
.scan-summary b{color:#90A4AE;}
.scan-list-wrap{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:none;-ms-overflow-style:none;}
.scan-list-wrap::-webkit-scrollbar{display:none;}
.scan-row{display:flex;align-items:flex-start;gap:7px;padding:6px 10px;border-bottom:1px solid #111a2a;font-size:12px;}
.scan-row:hover{background:#111d33;}
.scan-icon{font-size:14px;flex-shrink:0;margin-top:1px;width:16px;text-align:center;}
.scan-body{flex:1;min-width:0;}
.scan-code{font-weight:bold;color:#ccc;font-size:13px;font-family:monospace;letter-spacing:.04em;}
.scan-match{color:#43A047;font-size:11px;margin-top:1px;}
.scan-warn{color:#FFA726;font-size:11px;margin-top:1px;}
.scan-dup{color:#5a7a9a;font-size:11px;margin-top:1px;}
.scan-ts{color:#445;font-size:10px;flex-shrink:0;margin-top:2px;font-family:monospace;white-space:nowrap;}
.scan-del{background:none;border:none;color:#334;font-size:13px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;margin-top:1px;}
.scan-del:hover{color:#e57373;}
.scan-empty{padding:24px 14px;text-align:center;color:#334;font-size:12px;line-height:1.7;}
.scan-progress-wrap{margin:6px 10px 2px;height:7px;background:#0a1220;border-radius:4px;overflow:hidden;border:1px solid #1a2a44;}
.scan-progress-bar{height:100%;border-radius:4px;transition:width .4s ease;background:linear-gradient(90deg,#2e7d32,#43A047);}
.scan-progress-lbl{text-align:center;font-size:10px;color:#445;padding:1px 10px 5px;font-family:monospace;}
.scan-actions{display:flex;gap:6px;padding:6px 10px;border-top:1px solid #1a2540;flex-shrink:0;background:#0a1020;}
.scan-btn{background:#111d33;border:1px solid #2a3a5a;color:#778;font-size:11px;padding:4px 9px;border-radius:4px;cursor:pointer;}
.scan-btn:hover{background:#1a2d4a;color:#ccc;}
.scan-btn.danger:hover{background:#3a1a1a;color:#e57373;}
/* Case # field in PACK sidebar */
.pr-layer-row{display:flex;gap:4px;align-items:center;margin-top:3px;}.pr-layer-row:first-child{margin-top:0;}.pr-barcode-wrap{display:flex;align-items:center;gap:5px;margin-top:4px;}
.manifest-stack-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;font-size:11px;font-weight:bold;letter-spacing:.08em;cursor:pointer;user-select:none;border-bottom:1px solid rgba(0,0,0,.3);}
.manifest-stack-hdr:hover{filter:brightness(1.25);}
.manifest-stack-hdr.double-stack-hdr{background:rgba(255,152,0,.18);color:#ff9800;}
.manifest-stack-hdr.triple-stack-hdr{background:rgba(34,197,94,.18);color:#22c55e;}
.pr-barcode-lbl{font-size:10px;color:#445;white-space:nowrap;flex-shrink:0;}
.pr-barcode-input{flex:1;background:#0a1220;border:1px solid #1e2d44;border-radius:3px;color:#7a9;font-size:12px;padding:2px 6px;outline:none;font-family:monospace;}
.pr-barcode-input:focus{border-color:#43A047;color:#afd;}
.pr-barcode-input.flash-hit{border-color:#43A047!important;box-shadow:0 0 5px rgba(67,160,71,.7);transition:border-color .1s,box-shadow .1s;}
.pr-barcode-input.flash-miss{border-color:#E53935!important;box-shadow:0 0 5px rgba(229,57,53,.5);transition:border-color .1s,box-shadow .1s;}
.ctype-badge{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#e0e0e0;font-size:7px;font-weight:bold;padding:1px 4px;border-radius:2px;letter-spacing:.07em;pointer-events:none;z-index:5;white-space:nowrap;max-width:88%;overflow:hidden;}
.ctype-tag{font-size:9px;font-weight:bold;padding:1px 5px;border-radius:3px;background:rgba(144,164,174,.1);color:#6a8a9a;border:1px solid rgba(144,164,174,.2);white-space:nowrap;flex-shrink:0;letter-spacing:.05em;font-family:monospace;}
.mf-ctype-hdr{padding:5px 12px 3px;font-size:10px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.08em;background:#0a1020;border-top:2px solid #2a3a5a;}
.mf-ctype-row{display:flex;align-items:center;padding:5px 10px;font-size:13px;border-bottom:1px solid #111d33;gap:0;}
.mf-ctype-lbl{color:#8ab;white-space:nowrap;flex-shrink:0;font-size:11px;font-family:monospace;font-weight:bold;letter-spacing:.05em;margin-right:6px;}
.mf-ctype-num{font-weight:bold;color:#90cfff;font-size:14px;white-space:nowrap;}
.pr-confirm-btn{flex:1;background:#0a1220;border:1px solid #1e2d44;border-radius:3px;color:#445;font-size:11px;font-weight:bold;padding:2px 6px;cursor:pointer;text-align:center;letter-spacing:.04em;transition:all .15s;}
.pr-confirm-btn:hover{border-color:#43A047;color:#7ac;}
.pr-confirm-btn.confirmed{background:rgba(67,160,71,.15);border-color:#43A047;color:#43A047;}
.pr-mini-confirm{width:16px;height:16px;border-radius:3px;border:1px solid #1e2d44;background:#0a1220;color:#445;font-size:9px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0;}
.pr-mini-confirm:hover{border-color:#43A047;color:#7ac;}
.pr-mini-confirm.confirmed{background:rgba(67,160,71,.15);border-color:#43A047;color:#43A047;}
.pr-scan-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2);}

/* ── TRUCK SIGNS PAGE ── */
.signs-page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:#12182b;}
.signs-topbar{background:#0f1b33;border-bottom:2px solid #2a3a5a;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.signs-title{font-size:16px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.signs-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-wrap:wrap;gap:24px;align-content:flex-start;justify-content:center;}
.sign-card{background:#fff;color:#000;border:3px solid #000;border-radius:2px;width:480px;flex-shrink:0;display:flex;flex-direction:column;box-shadow:0 4px 18px rgba(0,0,0,.5);}
.sign-top{display:flex;border-bottom:2.5px solid #000;height:82px;flex-shrink:0;}
.sign-top-left{flex:0 0 46%;display:flex;flex-direction:column;justify-content:center;padding:8px 14px;gap:3px;overflow:hidden;}
.sign-top-mid{flex:0 0 28%;border-left:2px solid #000;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:6px 10px;overflow:hidden;}
.sign-top-right{flex:1;border-left:2px solid #000;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:6px 10px;overflow:hidden;}
.sign-show-name{font-size:9px;font-weight:bold;color:#555;letter-spacing:.06em;text-transform:uppercase;}
.sign-dest{font-size:18px;font-weight:900;color:#000;letter-spacing:.04em;line-height:1.1;}
.sign-date-lbl{font-size:10px;font-weight:900;color:#000;letter-spacing:.05em;text-transform:uppercase;}
.sign-date-val{font-size:19px;font-weight:normal;color:#000;white-space:nowrap;margin-top:2px;}
.sign-mid{height:222px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:8px 12px;overflow:hidden;}
.sign-truck-id{font-weight:900;color:#000;text-align:center;line-height:1;letter-spacing:-.01em;white-space:nowrap;}
.sign-footer{display:flex;border-top:2.5px solid #000;height:56px;flex-shrink:0;}
.sign-footer-contents{flex:1;display:flex;align-items:center;padding:5px 12px;font-weight:900;color:#000;letter-spacing:.03em;text-transform:uppercase;overflow:hidden;white-space:nowrap;}
.sign-footer-length{flex:0 0 68px;border-left:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#000;}
.signs-empty{padding:60px;text-align:center;color:#445;font-size:14px;}
.sign-font-picker{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.sign-font-opt{padding:4px 10px;border-radius:4px;font-size:13px;font-weight:bold;cursor:pointer;border:1px solid #2a3a5a;background:#0d1526;color:#778;white-space:nowrap;transition:all .1s;}
.sign-font-opt:hover{background:#1a2a44;color:#ccc;}
.sign-font-opt.active{background:#1F3864;color:#90cfff;border-color:#2a6aaa;}
/* ── APP NAV DROPDOWN ── */
.app-nav{position:relative;display:inline-flex;align-items:center;}
.app-nav-trigger{cursor:pointer;display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;user-select:none;transition:background .15s;}
.app-nav-trigger:hover{background:rgba(255,255,255,.09);}
.app-nav-caret{font-size:10px;color:#90A4AE;opacity:.7;margin-left:2px;}
.app-nav-menu{position:absolute;top:calc(100% + 6px);left:0;background:#1F3864;border:1px solid #2a4a7a;border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.6);z-index:200;min-width:160px;overflow:hidden;}
.app-nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:#ccc;cursor:pointer;white-space:nowrap;transition:background .1s;}
.app-nav-item:hover{background:#2a4a7a;color:#fff;}
.app-nav-item.active{background:#0f2044;color:#90cfff;font-weight:bold;}

/* ── GLOBAL MANIFEST PAGE ── */
.mf-page{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:#12182b;}
.mf-topbar{background:#0f1b33;border-bottom:2px solid #2a3a5a;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap;}
.mf-title{font-size:16px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.mf-show-name{font-size:18px;font-weight:bold;color:#fff;letter-spacing:.06em;white-space:nowrap;text-transform:uppercase;padding:0 10px;border-left:2px solid #2a3a5a;}
.mf-filters{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.mf-search{background:#0d1526;border:1px solid #2a3a5a;border-radius:5px;color:#ccc;font-size:12px;padding:5px 10px;outline:none;min-width:180px;flex:1;}
.mf-search:focus{border-color:#90A4AE;color:#fff;}
.mf-filter-lbl{font-size:10px;color:#556;text-transform:uppercase;font-weight:bold;white-space:nowrap;}
.mf-select{background:#0d1526;border:1px solid #2a3a5a;border-radius:5px;color:#ccc;font-size:12px;padding:5px 8px;outline:none;cursor:pointer;}
.mf-chip{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid #2a3a5a;background:#0d1526;color:#778;white-space:nowrap;transition:all .1s;}
.mf-chip:hover{background:#1a2a44;color:#ccc;}
.mf-chip.on{background:#1F3864;color:#90cfff;border-color:#2a6aaa;}
.mf-clear{background:none;border:1px solid #3a2a2a;border-radius:5px;color:#664;font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;}
.mf-clear:hover{background:#3a1a1a;color:#cc6666;}
.mf-body{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:none;-ms-overflow-style:none;}
.mf-body::-webkit-scrollbar{display:none;}
.mf-table{width:100%;border-collapse:collapse;}
.mf-thead tr{background:#0f1b33;position:sticky;top:0;z-index:10;}
.mf-thead th{padding:8px 12px;font-size:10px;font-weight:bold;color:#90A4AE;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:2px solid #2a3a5a;white-space:nowrap;cursor:pointer;user-select:none;}
.mf-thead th:hover{color:#fff;}
.mf-thead th .sort-arrow{margin-left:4px;opacity:.5;font-size:9px;}
.mf-thead th.sorted .sort-arrow{opacity:1;color:#90cfff;}
.mf-tbody tr{border-bottom:1px solid #1a2540;transition:background .1s;}
.mf-tbody tr:hover{background:#1a2540;}
.mf-tbody td{padding:8px 12px;font-size:13px;color:#ccc;vertical-align:middle;}
.mf-td-num{font-size:15px;font-weight:bold;color:#90cfff;white-space:nowrap;}
.mf-td-truck{font-size:12px;font-weight:bold;color:#90A4AE;white-space:nowrap;}

<div id="root"></div>
<script type="text/babel">

// ── localStorage compression helpers ─────────────────────────────────────────
// Wraps every read/write with LZ-String so the ~5MB quota is effectively
// eliminated. Old uncompressed entries decompress to empty string → falls back
// to the raw value, so existing data keeps working without a migration step.
const lsSet = (key, val) => {
  try {
    const str = typeof val === 'string' ? val : JSON.stringify(val);
    localStorage.setItem(key, LZString.compressToUTF16(str));
  } catch(e) {}
};
const lsGet = (key) => {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return null;
    const dec = LZString.decompressFromUTF16(raw);
    return (dec !== null && dec !== '') ? dec : raw;
  } catch(e) { return null; }
};
// ─────────────────────────────────────────────────────────────────────────────

const { useState, useRef, useEffect, useCallback } = React;

// ── Real-dimension constants ───────────────────────────────────────────────────
const TW_FT = 53, TH_FT = 8.5, SNAP_FT = 1/6, MAX_HIST = 30;

// ── Category colors ───────────────────────────────────────────────────────────
const CAT_COLORS = {
  'Truss':         { hex:'#90A4AE', tc:'#000' },
  'Motor Pack':    { hex:'#1F3864', tc:'#fff' },
  'Road Case':     { hex:'#1E88E5', tc:'#fff' },
  'Workbox':       { hex:'#FB8C00', tc:'#000' },
  'Dimmer/Distro': { hex:'#E53935', tc:'#fff' },
  'Cable':         { hex:'#5D4037', tc:'#fff' },
  'Rigging':       { hex:'#37474F', tc:'#fff' },
  'Audio':         { hex:'#6A1B9A', tc:'#fff' },
  'Video':         { hex:'#1565C0', tc:'#fff' },
  'Lighting':      { hex:'#F57F17', tc:'#000' },
};
const DEFAULT_CAT_COLOR = { hex:'#546E7A', tc:'#fff' };
const catColor = (cat) => CAT_COLORS[cat] || DEFAULT_CAT_COLOR;

// ── Vendor prefixes ───────────────────────────────────────────────────────────
const VENDORS = ['CL', '4W', 'PRG', 'CT'];
const vendorFromName = name => { for(const v of VENDORS) if(name.startsWith(v+' ')) return v; return null; };
const stripVendorPrefix = name => { for(const v of VENDORS) if(name.startsWith(v+' ')) return name.slice(v.length+1); return name; };
const isUtilityItem = item => (item?.cat||'').toLowerCase() === 'general';

const CLAUDIA_ENDPOINT = 'https://script.google.com/macros/s/AKfycbz-K_UtMZpW5jVh4Ztdx71ul0a5T8ko62KSV6EEsW1avidYRdGaDFOzFLts4JXFBaBXDQ/exec';

const CHAT_MSG_TEMPLATES = [
  {key:'staged',     icon:'🔵', label:'Is Staged',        text: id=>`${id} IS STAGED`,          color:'#448aff', bg:'rgba(68,138,255,.12)', border:'rgba(68,138,255,.4)'},
  {key:'loaded',     icon:'🟢', label:'Has Been Loaded',  text: id=>`${id} HAS BEEN LOADED`,    color:'#43A047', bg:'rgba(67,160,71,.12)',  border:'rgba(67,160,71,.4)'},
  {key:'unloaded',   icon:'🟡', label:'Is Unloaded',      text: id=>`${id} IS UNLOADED`,        color:'#e6c200', bg:'rgba(253,216,53,.10)', border:'rgba(230,194,0,.4)'},
  {key:'backloaded', icon:'🟠', label:'Is Backloaded',    text: id=>`${id} IS BACKLOADED`,      color:'#FF9800', bg:'rgba(255,152,0,.12)',  border:'rgba(255,152,0,.4)'},
  {key:'empty',      icon:'🔴', label:'Is Empty',         text: id=>`${id} IS EMPTY`,           color:'#E53935', bg:'rgba(229,57,53,.12)',  border:'rgba(229,57,53,.4)'},
];
const TRUCK_STATUS_CYCLE  = ['staged','loaded','unloaded','backloaded','empty'];
const TRUCK_STATUS_CONFIG = {
  staged:     {label:'▶ Staged',     color:'#448aff', border:'rgba(68,138,255,.5)',  bg:'rgba(68,138,255,.15)',  rowBg:'rgba(68,138,255,.07)'},
  loaded:     {label:'✓ Loaded',     color:'#43A047', border:'rgba(67,160,71,.5)',   bg:'rgba(67,160,71,.15)',   rowBg:'rgba(67,160,71,.07)'},
  unloaded:   {label:'○ Unloaded',   color:'#e6c200', border:'rgba(230,194,0,.5)',   bg:'rgba(253,216,53,.12)',  rowBg:'rgba(253,216,53,.05)'},
  backloaded: {label:'↩ Backloaded', color:'#FF9800', border:'rgba(255,152,0,.5)',   bg:'rgba(255,152,0,.13)',   rowBg:'rgba(255,152,0,.06)'},
  empty:      {label:'✕ Empty',      color:'#E53935', border:'rgba(229,57,53,.5)',   bg:'rgba(229,57,53,.13)',   rowBg:'rgba(229,57,53,.06)'},
};
const getTruckStatus = li => {
  if (!li) return null;
  if (li.status) return li.status;
  if (li.loaded) return 'loaded'; // backward compat
  return null;
};

// ── Default library (feet) ─────────────────────────────────────────────────────
const DEFAULT_LIBRARY = [
  { name:"TRUSS 4'",           cat:"Truss",        w:4,   h:1.5  },
  { name:"TRUSS 8'",           cat:"Truss",        w:8,   h:1.5  },
  { name:"TRUSS 8' 90°",       cat:"Truss",        w:1.5, h:8    },
  { name:"TRUSS 16'",          cat:"Truss",        w:16,  h:1.5  },
  { name:"TRUSS 24'",          cat:"Truss",        w:24,  h:1.5  },
  { name:"MOTOR CUBE",         cat:"Motor Pack",   w:3,   h:1.5  },
  { name:"MOTOR S2W",          cat:"Motor Pack",   w:4,   h:1.5  },
  { name:"MOTOR S2W 90°",      cat:"Motor Pack",   w:1.5, h:4    },
  { name:"ROAD CASE S2W",      cat:"Road Case",    w:4,   h:1.5  },
  { name:"ROAD CASE FIXTURES", cat:"Road Case",    w:4,   h:1.5  },
  { name:"ROAD CASE T2W",      cat:"Road Case",    w:5,   h:2    },
  { name:"WORKBOX",            cat:"Workbox",      w:3,   h:1.5  },
  { name:"POWER/DATA RACK",    cat:"Dimmer/Distro",w:3,   h:1.5  },
].map(x => ({ ...x, ...catColor(x.cat) }));

// ── Date formatter ────────────────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtDDMMMYYYY = d => {
  if(!d || isNaN(d.getTime())) return '';
  return `${String(d.getDate()).padStart(2,'0')}-${MONTHS_SHORT[d.getMonth()].toUpperCase()}-${d.getFullYear()}`;
};
const parseGvizDate = cell => {
  if(!cell || cell.v == null) return '';
  const v = cell.v;
  // gviz returns dates as "Date(2025,11,25)" — month is 0-indexed
  if(typeof v === 'string' && v.startsWith('Date(')) {
    const m = v.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(m) return fmtDDMMMYYYY(new Date(+m[1], +m[2], +m[3]));
  }
  // Try native Date parse (covers ISO strings, etc.)
  const d = new Date(v);
  if(!isNaN(d.getTime())) return fmtDDMMMYYYY(d);
  // Fall back to formatted value from sheet if present
  if(cell.f) return cell.f;
  return String(v);
};

// ── Manifest number helpers ───────────────────────────────────────────────
const getTruckPrefix = (truckId) => {
  if (!truckId) return '?';
  const m = truckId.match(/^([A-Za-z]+)(\d+)$/);
  if (!m) return truckId;
  const [, letters, num] = m;
  return letters.toUpperCase() === 'FAV' ? num : letters.charAt(0).toUpperCase() + num;
};
const lightenHex = (hex, amount = 0.52) => {
  if (!hex || hex === 'glass') return 'rgba(255,255,255,0.55)';
  try {
    const h = hex.replace('#','');
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return `rgb(${Math.round(r+(255-r)*amount)},${Math.round(g+(255-g)*amount)},${Math.round(b+(255-b)*amount)})`;
  } catch(e) { return 'rgba(255,255,255,0.55)'; }
};
const getManifestNum = (truckId, itemId) => `${getTruckPrefix(truckId)}-${itemId}`;

// ── Per-layer (stacking) helpers ─────────────────────────────────────────
const LAYER_PLACEHOLDERS = [
  ['[LABEL]'],
  ['[LABEL]', '[LABEL]'],
  ['[LABEL]', '[LABEL]', '[LABEL]'],
];
const LAYER_COLOR_LABELS = [
  ['Color:'],
  ['Top Color:', 'Bottom Color:'],
  ['Top Color:', 'Mid Color:', 'Bottom Color:'],
];
const getLayerInfo = (p, li) => ({
  label:    p.layerLabels?.[li]    ?? (li === 0 ? (p.label || '') : ''),
  hex:      p.layerHex?.[li]       ?? (li === 0 ? (p.customHex || 'glass') : 'glass'),
  tc:       p.layerTc?.[li]        ?? (li === 0 ? (p.customTc  || '#fff')  : '#fff'),
  caseType: p.layerCaseTypes?.[li] ?? '',
});

const apPlayDing = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -3; comp.ratio.value = 20;
    comp.connect(ctx.destination);
    [[1047, 4.48], [1058, 4.48]].forEach(([freq, vol]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(comp);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.8);
    });
    setTimeout(() => ctx.close(), 900);
  } catch(e) {}
};
const apPlayBuzz = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -3; comp.ratio.value = 20;
    comp.connect(ctx.destination);
    [[240, 100, 5.60], [252, 106, 5.60]].forEach(([f0, f1, vol]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(comp);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(f0, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(f1, ctx.currentTime + 0.35);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    });
    setTimeout(() => ctx.close(), 500);
  } catch(e) {}
};

// Orient item so longest dimension runs along x (nose→doors) unless rotate=true
const apOrientItem = (libItem, rotate) => {
  const long = Math.max(libItem.w, libItem.h);
  const short = Math.min(libItem.w, libItem.h);
  if (!rotate) return { ...libItem, w:long, h:short, rotated: libItem.h > libItem.w };
  return { ...libItem, w:short, h:long, rotated: libItem.w >= libItem.h };
};

// First-fit placement: scan left→right (nose→doors), then top→bottom
const apFindPos = (iw, ih, items) => {
  const step = SNAP_FT;
  const maxXi = Math.floor((TW_FT - iw) / step);
  const maxYi = Math.floor((TH_FT - ih) / step);
  if (maxXi < 0 || maxYi < 0) return null; // item too large
  // Outer: nose→doors (x ascending); Inner: right wall→left wall (y ascending, top=right)
  for (let xi = 0; xi <= maxXi; xi++) {
    const x = xi * step;
    for (let yi = 0; yi <= maxYi; yi++) {
      const y = yi * step;
      if (!Object.values(items).some(p =>
        overlapsRect(x, y, iw-0.001, ih-0.001, p.x_ft, p.y_ft, p.item.w-0.001, p.item.h-0.001)
      )) return {
        x_ft: Math.min(x, Math.max(0, TW_FT - iw)),
        y_ft: Math.min(y, Math.max(0, TH_FT - ih))
      };
    }
  }
  return null; // trailer full
};

// ── Truck Signs PDF ───────────────────────────────────────────────────────────
function buildSignsPDF(trucksData, truckIds, showName='', mode='save') {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter' });
  const PW=792, PH=612, MX=20, MY=20;
  const IW=PW-MX*2, IH=PH-MY*2;

  const drawSign = (tid) => {
    const info = trucksData[tid]?.info || {};
    const truckId    = info.id       || tid;
    const contents   = (info.contents || '').toUpperCase();
    const length     = info.length   || "53'";
    const dateStr    = (info.pickupDate || info.deliveryDate || '').replace(/[-,\s\/]+\d{4}$/, '').trim();
    const dest       = (info.destination || '').toUpperCase().trim();
    const trailerNum = info.trailerNum || '';
    let destLabel    = dest;
    if (/OCCC\s*N$/i.test(dest))  destLabel = 'OCCC NORTH';
    if (/OCCC\s*S$/i.test(dest))  destLabel = 'OCCC SOUTH';

    const topH = Math.round(IH * 0.21);
    const botH = Math.round(IH * 0.135);
    const midH = IH - topH - botH;
    const topSplit1 = Math.round(IW * 0.46);  // left col width
    const topSplit2 = Math.round(IW * 0.74);  // left+mid col width (second divider x)
    const footSplit = Math.round(IW * 0.775);

    // Outer border
    doc.setDrawColor('#000000'); doc.setLineWidth(2.5);
    doc.rect(MX, MY, IW, IH);

    // Top section horizontal divider
    doc.setLineWidth(2);
    doc.line(MX, MY+topH, MX+IW, MY+topH);

    // Top vertical dividers — 3 columns
    doc.setLineWidth(1.5);
    doc.line(MX+topSplit1, MY, MX+topSplit1, MY+topH);  // left | mid
    doc.line(MX+topSplit2, MY, MX+topSplit2, MY+topH);  // mid  | right

    // Show name (top-left, small)
    if (showName) {
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor('#444444');
      doc.text(showName.toUpperCase(), MX+14, MY+18);
    }

    // OCCC destination (top-left, large)
    if (destLabel) {
      doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor('#000000');
      doc.text(destLabel, MX+14, MY+topH*0.62);
    }

    // DELIVER DATE (middle box)
    const midBoxX = MX+topSplit1, midBoxW = topSplit2-topSplit1;
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor('#000000');
    doc.text('EXPECTED DELIVERY DATE:', midBoxX+midBoxW/2, MY+topH*0.33, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(24); doc.setTextColor('#000000');
    doc.text(dateStr||'—', midBoxX+midBoxW/2, MY+topH*0.73, {align:'center'});

    // TRAILER # (right box)
    const tBoxX = MX+topSplit2, tBoxW = IW-topSplit2;
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor('#000000');
    doc.text('TRAILER #:', tBoxX+tBoxW/2, MY+topH*0.33, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(24); doc.setTextColor('#000000');
    doc.text(trailerNum||'—', tBoxX+tBoxW/2, MY+topH*0.73, {align:'center'});

    // Truck ID — fill middle section (both height and width constrained)
    const idByH = Math.floor((midH - 40) * 0.92);
    const idByW = Math.floor((IW - 32)   / Math.max(1, truckId.length * 0.68));
    const fs    = Math.max(72, Math.min(idByH, idByW));
    const midCY = MY + topH + midH/2 + fs*0.36;
    doc.setFont('helvetica','bold'); doc.setFontSize(fs); doc.setTextColor('#000000');
    doc.text(truckId, PW/2, midCY, {align:'center'});

    // Footer top border
    const footY = MY+topH+midH;
    doc.setLineWidth(2);
    doc.line(MX, footY, MX+IW, footY);

    // Footer vertical divider
    doc.setLineWidth(1.5);
    doc.line(MX+footSplit, footY, MX+footSplit, footY+botH);

    // Contents text — largest single-line size that fits (leave clear air above/below)
    const cAvailW = footSplit - 28;
    const cAvailH = botH - 26;
    const cByH = Math.floor(cAvailH * 0.80);
    const cByW = Math.floor(cAvailW / Math.max(1, contents.length * 0.65));
    const cfs  = Math.max(10, Math.min(cByH, cByW));
    doc.setFont('helvetica','bold'); doc.setFontSize(cfs); doc.setTextColor('#000000');
    const cY = footY + (botH + cfs*0.72) / 2;
    doc.text(contents||'—', MX+12, cY);

    // Length
    doc.setFont('helvetica','bold'); doc.setFontSize(30); doc.setTextColor('#000000');
    const lenX = MX + footSplit + (IW-footSplit)/2;
    doc.text(length, lenX, footY + botH/2 + 11, {align:'center'});
  };

  truckIds.forEach((tid, i) => {
    if (i > 0) doc.addPage();
    drawSign(tid);
  });

  const fname = truckIds.length===1 ? `truck-sign-${truckIds[0]}.pdf` : 'truck-signs.pdf';
  if (mode==='save') doc.save(fname);
  else doc.output('dataurlnewwindow');
}

  infoRow('CONTENTS',info.contents,col1,iy); infoRow('LENGTH / DOOR',`${info.length||"53'"} ${info.doorType||''}`.trim(),col2,iy); infoRow('DELIVERY DATE',info.deliveryDate,col3,iy);

  // ── TRAILER (full width) ────────────────────────────────────────
  const gridTop = MY + HDR_H + 64;
  const PDF_SCALE = AW / TW_FT;
  const gridH = TH_FT * PDF_SCALE;

  // Foot markers
  doc.setFontSize(6); doc.setFont('helvetica','normal'); doc.setTextColor('#555');
  for (let f=2; f<=TW_FT; f+=2)
    doc.text(`${f}'`, MX+f*PDF_SCALE, gridTop-4, {align:'center'});

  // Trailer: white fill, dark border only — no grid
  doc.setFillColor('#ffffff');
  doc.setDrawColor('#333333'); doc.setLineWidth(2);
  doc.rect(MX, gridTop, AW, gridH, 'FD');

  // ── Placed items ─────────────────────────────────────────────────
  // Center all items as a group within the truck rectangle
  const placedArr = Object.values(placed);
  const cOffX_ft = 0; // items always align to left (front of truck)
  const cOffY_ft = (() => {
    if (!placedArr.length) return 0;
    const minY = Math.min(...placedArr.map(p=>p.y_ft));
    const maxY = Math.max(...placedArr.map(p=>p.y_ft+p.item.h));
    return (TH_FT - (maxY - minY)) / 2 - minY;
  })();

  placedArr.sort((a,b)=>a.y_ft-b.y_ft||a.x_ft-b.x_ft).forEach(p => {
    const {item, x_ft, y_ft, doubleStack, tripleStack} = p;
    const lc = tripleStack ? 3 : doubleStack ? 2 : 1;
    const bx=MX+(x_ft+cOffX_ft)*PDF_SCALE, by=gridTop+(y_ft+cOffY_ft)*PDF_SCALE;
    const bw=item.w*PDF_SCALE, bh=item.h*PDF_SCALE;

    // Per-layer info (mirrors getLayerInfo in component)
    const pdfLI = (li) => ({
      label:   p.layerLabels?.[li]   ?? (li===0 ? (p.label||'') : ''),
      barcode: p.layerBarcodes?.[li] ?? (li===0 ? (p.barcode||'') : ''),
      hex:     p.layerHex?.[li]      ?? (li===0 ? (p.customHex||'glass') : 'glass'),
    });

    // Build label lines first so font size can be derived from line count
    const buildLines = () => {
      const ls = [stripVendorPrefix(item.name)];
      const layerLines = Array.from({length:lc}, (_,li) => {
        const { barcode, label } = pdfLI(li);
        return (barcode||'').trim() || (label||'').trim();
      });
      const allLabelled = layerLines.every(l => l.length > 0);
      layerLines.forEach(l => { if(l) ls.push(l); });
      if (doubleStack && !allLabelled) ls.push('DBL STACK');
      if (tripleStack && !allLabelled) ls.push('TRPL STACK');
      return ls;
    };

    // Always glass look on white paper
    doc.setFillColor('#E0E8F0'); doc.rect(bx,by,bw,bh,'F');
    if (tripleStack)      { doc.setDrawColor(stackHighlight?'#22c55e':'#222222'); doc.setLineWidth(stackHighlight?1.5:1); }
    else if (doubleStack) { doc.setDrawColor(stackHighlight?'#ff9800':'#222222'); doc.setLineWidth(stackHighlight?1.5:1); }
    else                  { doc.setDrawColor('#aaaaaa'); doc.setLineWidth(0.5); }
    doc.rect(bx,by,bw,bh,'S');

    // Text always dark for readability on light fill
    doc.setTextColor('#111111');
    const cx=bx+bw/2, cy=by+bh/2;

    if (isUtilityItem(item)) {
      // No text — symbol only
    } else if (bh > bw) {
      // Tall/rotated item — text runs along long axis (bh)
      const lines=buildLines();
      const swPad = Math.max(2, Math.min(5, Math.min(bw,bh)*0.12)) + 3;
      const availLong  = bh - swPad*2;  // usable length along long axis
      const availShort = bw - swPad*2;  // usable width across short axis (line spacing)
      const fsBySpread = availShort / (lines.length * 1.4);
      const fsByLength = availLong * 0.28;
      const fs = Math.min(7, Math.max(3, Math.min(fsBySpread, fsByLength)));
      doc.setFontSize(fs);
      const lineH = fs * 1.4;
      // jsPDF angle:90 = 90° CCW: text runs UPWARD from anchor, cap-height extends RIGHT.
      // Vertical: anchor at cy + tw/2 so text runs up to cy - tw/2 → midpoint = cy.
      // Horizontal: cap-height goes RIGHT of baseline, so to center visually: baseline = cx - fs*0.7
      lines.forEach((ln, li) => {
        const xOff = (li - (lines.length-1)/2) * lineH;
        const tw = doc.getTextWidth(ln);
        const tx = cx + xOff - fs*0.7;  // shift baseline left so visual character center = cx
        const ty = cy + tw/2;            // anchor below cy so upward text midpoint lands at cy
        doc.text(ln, tx, ty, {angle:90});
      });
    } else {
      const lines=buildLines();
      // Wide item — text stacks horizontally, lines spread vertically
      const fsByHeight = (bh - 4) / (lines.length * 1.4);
      const fsByWidth  = Math.min(bw, bh) * 0.26;
      const fs = Math.min(7, Math.max(3, Math.min(fsByHeight, fsByWidth)));
      doc.setFontSize(fs);
      const lineH = fs * 1.4;
      lines.forEach((ln, li) => {
        const yOff = (li - (lines.length-1)/2) * lineH;
        doc.text(ln, cx, cy + yOff + fs*0.35, {align:'center', maxWidth:bw-4});
      });
    }

    // Color swatches — on long ends (top/bottom for tall/rotated, left/right for wide)
    const swatchLayers = Array.from({length:lc},(_,li)=>({li,hex:pdfLI(li).hex})).filter(({hex})=>hex&&hex!=='glass');
    if (swatchLayers.length) {
      const isRot = bh > bw;
      const sw = Math.max(2, Math.min(5, Math.min(bw,bh)*0.12));
      const inset = 3;
      if (isRot) {
        // Tall/rotated: horizontal swatches at top and bottom (long ends)
        const sw2 = sw * 2, gap = 1.5;
        const totalW = swatchLayers.length * sw2 + (swatchLayers.length-1) * gap;
        const startX = bx + (bw - totalW) / 2;
        swatchLayers.forEach(({hex}, si) => {
          const sx = startX + si * (sw2 + gap);
          doc.setFillColor(hex); doc.setDrawColor('#33333333'); doc.setLineWidth(0.3);
          doc.rect(sx, by + inset, sw2, sw, 'FD');
          doc.rect(sx, by + bh - inset - sw, sw2, sw, 'FD');
        });
      } else {
        // Wide: vertical swatches on left and right sides
        const sh = sw * 2, gap = 1.5;
        const totalH = swatchLayers.length * sh + (swatchLayers.length-1) * gap;
        const startY = by + (bh - totalH) / 2;
        swatchLayers.forEach(({hex}, si) => {
          const sy = startY + si * (sh + gap);
          doc.setFillColor(hex); doc.setDrawColor('#33333333'); doc.setLineWidth(0.3);
          doc.rect(bx + inset, sy, sw, sh, 'FD');
          doc.rect(bx + bw - inset - sw, sy, sw, sh, 'FD');
        });
      }
    }
  });

  // ── PIECE COUNT + MANIFEST — below trailer ─────────────────────
  const pcTop = gridTop + gridH + 10;
  const pcBottom = PH - 22;
  const pcAvailH = pcBottom - pcTop;
  const PC_W = 185;
  const rowH = 10;
  const hdrH = 13;

  // Build qty map (exclude General/utility items)
  const qtyMap = {};
  Object.values(placed).forEach(p => {
    if (isUtilityItem(p.item)) return;
    const key=p.item.name;
    if (!qtyMap[key]) qtyMap[key]={count:0};
    qtyMap[key].count += (p.tripleStack?3:p.doubleStack?2:1);
  });
  const qtyList=Object.entries(qtyMap).sort((a,b)=>b[1].count-a[1].count||a[0].localeCompare(b[0]));
  const grandTotal=qtyList.reduce((s,[,{count}])=>s+count,0);

  // ── Piece Count ──────────────────────────────────────────────────
  doc.setFillColor('#333333');
  doc.rect(MX, pcTop, PC_W, hdrH, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor('#ffffff');
  doc.text('PIECE COUNT', MX+PC_W/2, pcTop+9, {align:'center'});
  let py=pcTop+hdrH;
  doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
  qtyList.forEach(([name,{count}],i) => {
    if (i%2===0) { doc.setFillColor('#eeeeee'); doc.rect(MX, py, PC_W, rowH, 'F'); }
    doc.setTextColor('#222'); doc.setFont('helvetica','normal');
    const stripped=stripVendorPrefix(name); const dispName=stripped.length>26?stripped.slice(0,25)+'…':stripped;
    doc.text(dispName, MX+4, py+7);
    doc.setFont('helvetica','bold'); doc.setTextColor('#111');
    doc.text(String(count), MX+PC_W-4, py+7, {align:'right'});
    doc.setDrawColor('#cccccc'); doc.setLineWidth(0.2);
    doc.line(MX, py+rowH, MX+PC_W, py+rowH);
    py+=rowH;
  });
  doc.setFillColor('#cccccc'); doc.rect(MX, py, PC_W, rowH+2, 'F');
  doc.setDrawColor('#999999'); doc.setLineWidth(0.5); doc.rect(MX, py, PC_W, rowH+2, 'S');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor('#111');
  doc.text('TOTAL', MX+4, py+8); doc.text(String(grandTotal), MX+PC_W-4, py+8, {align:'right'});

  // ── Manifest (multi-column) ───────────────────────────────────────
  const mfLeft = MX + PC_W + 8;
  const mfAvailW = MX + AW - mfLeft;

  // Per-layer helper
  const mfLI = (p,li) => ({
    label: p.layerLabels?.[li] ?? (li===0 ? (p.label||'') : ''),
    hex:   p.layerHex?.[li]    ?? (li===0 ? (p.customHex||'glass') : 'glass'),
    tc:    p.layerTc?.[li]     ?? (li===0 ? (p.customTc||'#fff')  : '#fff'),
  });

  // Build flat cell list (exclude General/utility items)
  const mfCells = [];
  Object.values(placed).forEach(p => {
    if (isUtilityItem(p.item)) return;
    const lc = p.tripleStack?3:p.doubleStack?2:1;
    const isTruss = ['truss','other'].includes((p.item.cat||'').toLowerCase());
    if (lc > 1) {
      const suffix = (() => {
        if (isTruss) {
          const ls=[...new Set(Array.from({length:lc},(_,li)=>(mfLI(p,li).label||'').trim()).filter(Boolean))];
          return ls.length?' — '+ls.join(' • '):'';
        }
        const ids=Array.from({length:lc},(_,li)=>(p.layerBarcodes?.[li]??(li===0?(p.barcode||''):'')).trim()).filter(Boolean);
        return ids.length?' — '+ids.join(' • '):'';
      })();
      mfCells.push({type:'hdr', text:`${lc===3?'TRIPLE':'DOUBLE'} — ${stripVendorPrefix(p.item.name)}${suffix}`});
    }
    for (let li=0; li<lc; li++) {
      const li_info = mfLI(p,li);
      const isGlass = !li_info.hex || li_info.hex==='glass';
      const bc = isTruss ? '' : ((p.layerBarcodes?.[li]??(li===0?(p.barcode||''):'')).trim());
      mfCells.push({type:'row', bg:isGlass?null:li_info.hex, tc:isGlass?'#111111':li_info.tc,
        name:stripVendorPrefix(p.item.name), bc, label:li_info.label});
    }
  });

  // How many columns needed
  const mfRowsAvail = Math.floor((pcAvailH - hdrH) / rowH);
  const totalRows = mfCells.reduce((s,c)=>s+(c.type==='hdr'?1:1),0);
  const nCols = Math.min(4, Math.max(1, Math.ceil(totalRows / mfRowsAvail)) * 2);
  const colW = Math.floor(mfAvailW / nCols);

  // Header
  doc.setFillColor('#333333');
  doc.rect(mfLeft, pcTop, mfAvailW, hdrH, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor('#ffffff');
  doc.text('MANIFEST', mfLeft+mfAvailW/2, pcTop+9, {align:'center'});

  // Render cells
  let mfCol=0, mfY=pcTop+hdrH;
  mfCells.forEach(cell => {
    if (mfY + rowH > pcBottom && mfCol < nCols-1) { mfCol++; mfY=pcTop+hdrH; }
    const cx = mfLeft + mfCol*colW;
    if (cell.type==='hdr') {
      doc.setFillColor('#555555'); doc.rect(cx, mfY, colW, rowH, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor('#ffffff');
      doc.text(cell.text, cx+3, mfY+7, {maxWidth:colW-6});
    } else {
      if (cell.bg) { doc.setFillColor(cell.bg); doc.rect(cx, mfY, colW, rowH, 'F'); }
      else if (mfCells.indexOf(cell)%2===0) { doc.setFillColor('#eeeeee'); doc.rect(cx, mfY, colW, rowH, 'F'); }
      doc.setDrawColor('#cccccc'); doc.setLineWidth(0.2); doc.line(cx, mfY+rowH, cx+colW, mfY+rowH);
      const textColor = cell.bg ? (cell.tc==='#fff'?'#ffffff':'#111111') : '#222222';
      doc.setTextColor(textColor);
      const bcW = cell.bc ? 38 : 0;
      if (cell.bc) {
        doc.setFont('helvetica','bold'); doc.setFontSize(5.5);
        doc.text(cell.bc.length>7?cell.bc.slice(0,6)+'…':cell.bc, cx+3, mfY+7, {maxWidth:bcW});
      }
      const labelW = cell.label ? 42 : 0;
      const nameX = cx+3+bcW; const nameW = colW-6-bcW-labelW;
      doc.setFont('helvetica','bold'); doc.setFontSize(5.5);
      doc.text(cell.name, nameX, mfY+7, {maxWidth:nameW});
      if (cell.label) {
        doc.setFont('helvetica','italic'); doc.setFontSize(5);
        doc.text(cell.label, cx+colW-3, mfY+7, {align:'right', maxWidth:labelW});
      }
    }
    mfY += rowH;
  });

  // ── FOOTER ─────────────────────────────────────────────────────
  const footY = PH - 16;
  doc.setDrawColor('#cccccc'); doc.setLineWidth(0.5);
  doc.line(MX, footY-5, MX+AW, footY-5);
  doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor('#444');
  doc.text(`TRUCK: ${info.id}  |  Generated by the Killing The Mains Truck Pack App  |  ${new Date().toLocaleDateString()}`, PW/2, footY+2, {align:'center'});

  if (mode==='preview') {
    const url=doc.output('bloburl');
    window.open(url,'_blank');
  } else {
    doc.save(`${info.id}-TruckPack.pdf`);
  }
}

// ── Auto-backup: IndexedDB helpers for persisting directory handle ────────────
const _openBackupDB = () => new Promise((res, rej) => {
  const r = indexedDB.open('trailerPackerBackup', 1);
  r.onupgradeneeded = e => e.target.result.createObjectStore('handles');
  r.onsuccess = e => res(e.target.result);
  r.onerror = () => rej(r.error);
});
const saveBackupHandle = async (handle) => {
  const db = await _openBackupDB();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'backupDir');
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
};
const loadBackupHandle = async () => {
  try {
    const db = await _openBackupDB();
    return new Promise((res) => {
      const tx = db.transaction('handles', 'readonly');
      const r = tx.objectStore('handles').get('backupDir');
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => res(null);
    });
  } catch(e) { return null; }
};
const writeBackupFile = async (dirHandle, trucks, truckLoaded, showName) => {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const filename = `backup-${stamp}.json`;
  const payload = JSON.stringify({ trucks, truckLoaded, exportedAt: now.toISOString(), showName }, null, 2);
  const fh = await dirHandle.getFileHandle(filename, { create: true });
  const w = await fh.createWritable();
  await w.write(payload); await w.close();
  return filename;
};

  const [apPickerId,     setApPickerId]     = useState(null);
  const [apCtlFeedback,  setApCtlFeedback]  = useState(null); // { msg, ts } — control barcode flash
  const [apPurgatory,    setApPurgatory]    = useState(()=>{ const s=apGetSlots(); return s[apGetActiveIdx()]?.purgatory||[]; });
  const [apPurgPickerId,  setApPurgPickerId]  = useState(null);
  const [apPurgSelected,  setApPurgSelected]  = useState(()=>new Set());

  },[view]);

  // ── Auto Pack Beta — persist active slot to ap_slots on every change ────
  useEffect(()=>{
    try {
      const slots = apGetSlots();
      slots[apActiveSlot] = { label: apSlotLabels[apActiveSlot]||`T${apActiveSlot+1}`, items:apItems, nextId:apNextId, scans:apScans, purgatory:apPurgatory };
      lsSet('ap_slots', JSON.stringify(slots));

  // ── Case lookup flash state ───────────────────────────────────────────────
  const [caseFlash, setCaseFlash] = useState({});
  const caseIdOnFocusRef = useRef({});
  // ── Auto-backup state ─────────────────────────────────────────────────────
  const backupDirRef       = useRef(null);

  useEffect(() => {

  useEffect(() => {
